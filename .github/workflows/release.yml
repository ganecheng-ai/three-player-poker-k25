name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: Linux
            artifact_name: doudizhu-linux-x64
            asset_name: doudizhu-linux-x64.tar.gz
          - os: windows-latest
            target: Windows
            artifact_name: doudizhu-windows-x64
            asset_name: doudizhu-windows-x64.exe
          - os: macos-latest
            target: macOS
            artifact_name: doudizhu-macos-x64
            asset_name: doudizhu-macos-x64.dmg

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev python3-pip libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

    - name: Install dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        python -m pip install --upgrade pip

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install sdl2 sdl2_image sdl2_mixer sdl2_ttf

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt

    - name: Build with PyInstaller (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --onefile --windowed \
          --name doudizhu \
          --add-data "assets:assets" \
          --hidden-import=pygame \
          --hidden-import=src.game \
          --hidden-import=src.ui \
          --hidden-import=src.ai \
          --hidden-import=src.utils \
          src/main.py
        tar -czf ${{ matrix.asset_name }} -C dist doudizhu

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile --windowed `
          --name doudizhu `
          --add-data "assets;assets" `
          --hidden-import=pygame `
          --hidden-import=src.game `
          --hidden-import=src.ui `
          --hidden-import=src.ai `
          --hidden-import=src.utils `
          src/main.py
        Rename-Item -Path "dist\doudizhu.exe" -NewName "${{ matrix.asset_name }}"

    - name: Build with PyInstaller (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --onefile --windowed \
          --name doudizhu \
          --add-data "assets:assets" \
          --hidden-import=pygame \
          --hidden-import=src.game \
          --hidden-import=src.ui \
          --hidden-import=src.ai \
          --hidden-import=src.utils \
          src/main.py
        # 创建DMG（简化版，可以使用create-dmg工具进一步优化）
        mkdir -p dist/dmg
        cp dist/doudizhu dist/dmg/
        hdiutil create -volname "Doudizhu" -srcfolder dist/dmg -ov -format UDZO ${{ matrix.asset_name }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.asset_name }}

  generate-checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Generate checksums
      run: |
        cd artifacts
        sha256sum */* > checksums.txt
        cat checksums.txt

    - name: Upload checksums
      uses: actions/upload-artifact@v4
      with:
        name: checksums
        path: artifacts/checksums.txt

  release:
    needs: [build, generate-checksums]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Get release info from tag
      id: get_release_info
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Generate release notes
      id: release_notes
      run: |
        VERSION=${{ steps.get_release_info.outputs.version }}
        cat > release_notes.md << EOF
        ## 斗地主游戏 $VERSION

        ### 下载
        - Windows: \`doudizhu-windows-x64.exe\`
        - Linux: \`doudizhu-linux-x64.tar.gz\`
        - macOS: \`doudizhu-macos-x64.dmg\`

        ### 安装说明
        - **Windows**: 下载并运行 \`.exe\` 文件
        - **Linux**: 解压 \`.tar.gz\` 文件后运行 \`./doudizhu\`
        - **macOS**: 打开 \`.dmg\` 文件并将应用拖入应用程序文件夹

        ### 校验
        请使用 \`checksums.txt\` 验证文件完整性。
        EOF

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ steps.get_release_info.outputs.version }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        files: |
          artifacts/doudizhu-linux-x64/doudizhu-linux-x64.tar.gz
          artifacts/doudizhu-windows-x64/doudizhu-windows-x64.exe
          artifacts/doudizhu-macos-x64/doudizhu-macos-x64.dmg
          artifacts/checksums/checksums.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
